<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AniRecs Login</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="login-wrapper">
    <div class="login-card">
      <h1 id="form-title">Welcome Back</h1>
      <p id="form-description">Sign in to access the anime recommendations.</p>
      <form id="auth-form">
        <div class="form-group">
          <label for="username">Username</label>
          <input id="username" type="text" placeholder="Enter username" required>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input id="password" type="password" placeholder="Enter password" required>
        </div>

        <div class="form-group confirm-password-group hidden">
          <label for="confirm-password">Confirm Password</label>
          <input id="confirm-password" type="password" placeholder="Confirm password">
        </div>

        <button type="submit" id="submit-button">Login</button>
        <p id="error-message" class="error-message"></p>
      </form>
      <div class="auth-switch">
        <span id="switch-text">Don't have an account?</span>
        <button id="switch-mode" type="button">Create one</button>
      </div>
    </div>
  </div>
  <script>
    const authForm = document.getElementById('auth-form');
    const errorMessage = document.getElementById('error-message');
    const formTitle = document.getElementById('form-title');
    const formDescription = document.getElementById('form-description');
    const submitButton = document.getElementById('submit-button');
    const switchText = document.getElementById('switch-text');
    const switchModeButton = document.getElementById('switch-mode');
    const confirmPasswordGroup = document.querySelector('.confirm-password-group');

    let currentMode = 'login';
    const STORAGE_KEY = 'aniRecsAccount';

    function loadAccount() {
      const stored = localStorage.getItem(STORAGE_KEY);
      return stored ? JSON.parse(stored) : null;
    }

    function saveAccount(username, password) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({ username, password }));
    }

    function setLoggedIn() {
      localStorage.setItem('aniRecsLoggedIn', 'true');
    }

    function updateFormMode() {
      if (currentMode === 'signup') {
        formTitle.textContent = 'Create Your Account';
        formDescription.textContent = 'Set up your account to log in anytime.';
        submitButton.textContent = 'Sign Up';
        switchText.textContent = 'Already have an account?';
        switchModeButton.textContent = 'Login';
        confirmPasswordGroup.classList.remove('hidden');
      } else {
        formTitle.textContent = 'Welcome Back';
        formDescription.textContent = 'Sign in to access the anime recommendations.';
        submitButton.textContent = 'Login';
        switchText.textContent = 'Don\'t have an account?';
        switchModeButton.textContent = 'Create one';
        confirmPasswordGroup.classList.add('hidden');
      }
      errorMessage.textContent = '';
    }

    authForm.addEventListener('submit', event => {
      event.preventDefault();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirm-password').value;
      const account = loadAccount();

      if (!username || !password) {
        errorMessage.textContent = 'Please fill in both username and password.';
        return;
      }

      if (currentMode === 'signup') {
        if (password.length < 5) {
          errorMessage.textContent = 'Password must be at least 5 characters.';
          return;
        }
        if (password !== confirmPassword) {
          errorMessage.textContent = 'Passwords do not match.';
          return;
        }
        if (account && account.username !== username) {
          errorMessage.textContent = 'An account already exists. Please login.';
          return;
        }
        saveAccount(username, password);
        setLoggedIn();
        window.location.href = 'ANIME.HTML';
      } else {
        if (!account) {
          errorMessage.textContent = 'No account found. Please create one first.';
          return;
        }
        if (username === account.username && password === account.password) {
          setLoggedIn();
          window.location.href = 'ANIME.HTML';
        } else {
          errorMessage.textContent = 'Incorrect username or password. Try again.';
        }
      }
    });

    switchModeButton.addEventListener('click', () => {
      currentMode = currentMode === 'login' ? 'signup' : 'login';
      updateFormMode();
    });

    updateFormMode();
  </script>
</body>
</html>
